[profile.default]
src = "contracts"
out = "artifacts"
libs = ["node_modules", "lib"]
remappings = [
    "@openzeppelin/=node_modules/@openzeppelin/",
    "@openzeppelin-v5/=node_modules/@openzeppelin/"
]
via_ir = true
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
celo_sepolia = "https://forno.celo-sepolia.celo-testnet.org"
celo_mainnet = "https://forno.celo.org"
